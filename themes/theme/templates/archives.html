{% extends "base.html" %}
{% block title %}归档 — {{ SITENAME }}{% endblock %}
{% block content %}
<section class="archive">
  <h1>归档</h1>
  <dl class="archive-list">
    {% for article in dates %}
    <dt>{{ article.date.strftime('%Y-%m-%d') }}</dt>
    <dd><a href="{{ SITEURL }}/{{ article.url }}">{{ article.title }}</a></dd>
    {% endfor %}
  </dl>
</section>
{% endblock %}
