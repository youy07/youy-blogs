{% extends "base.html" %}
{% block title %}作者 — {{ SITENAME }}{% endblock %}
{% block content %}
<section class="authors">
  <h1>作者</h1>
  <ul class="author-list">
    {% for author, articles in authors|sort %}
    <li><a href="{{ SITEURL }}/{{ author.url }}">{{ author }}</a> ({{ articles|count }})</li>
    {% endfor %}
  </ul>
</section>
{% endblock %}
